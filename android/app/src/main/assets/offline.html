<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flowmerce</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      color: white;
      text-align: center;
      padding: 2rem;
    }
    .logo {
      width: 100px;
      height: 100px;
      background: white;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .logo svg { width: 60px; height: 60px; }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { font-size: 1rem; opacity: 0.85; margin-bottom: 2rem; }
    button {
      background: white;
      color: #3b82f6;
      border: none;
      padding: 0.9rem 2rem;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
  </style>
</head>
<body>
  <div class="logo">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 35 Q30 20 50 35 Q70 50 90 35" stroke="#3b82f6" stroke-width="10" stroke-linecap="round" fill="none"/>
      <path d="M10 55 Q30 40 50 55 Q70 70 90 55" stroke="#06b6d4" stroke-width="10" stroke-linecap="round" fill="none"/>
      <path d="M10 75 Q30 60 50 75 Q70 90 90 75" stroke="#93c5fd" stroke-width="10" stroke-linecap="round" fill="none"/>
    </svg>
  </div>
  <h1>Flowmerce</h1>
  <p>Pas de connexion Internet.{"\n"}Vérifiez votre réseau et réessayez.</p>
  <button onclick="
    if (navigator.onLine) {
      window.location.href='https://flowmerce-web-app.vercel.app/';
    } else {
      this.textContent='Toujours hors ligne...';
      setTimeout(() => this.textContent='↺ Réessayer', 2000);
    }
  ">↺ Réessayer</button>
</body>
</html>
